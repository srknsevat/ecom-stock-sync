server.port=${PORT:8080}
server.address=0.0.0.0

# PostgreSQL bağlantısı varsa kullan, yoksa H2 kullan
spring.datasource.url=${DATABASE_URL:jdbc:h2:mem:ecomsync}
spring.datasource.username=${DATABASE_USERNAME:SA}
spring.datasource.password=${DATABASE_PASSWORD:}

# Driver otomatik tespit edilecek

# H2 için fallback
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.database-platform=${JPA_DATABASE_PLATFORM:org.hibernate.dialect.H2Dialect}

encryption.key=${ENCRYPTION_KEY:change-me-32-bytes-key-123456}

# Admin credentials
app.admin.username=${ADMIN_USERNAME:admin}
app.admin.password=${ADMIN_PASSWORD:admin}

# Health check
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=always
management.health.defaults.enabled=true
